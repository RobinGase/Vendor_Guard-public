name: pip-audit

on:
  push:
    branches: [main]
    paths: [requirements.txt, .github/workflows/pip-audit.yml]
  pull_request:
    paths: [requirements.txt, .github/workflows/pip-audit.yml]
  schedule:
    - cron: "17 6 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --strict
